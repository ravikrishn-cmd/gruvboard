[dashboard]
title = "GruvBoard"
host = "127.0.0.1"
port = 9500
poll_interval_seconds = 30
metrics_history_days = 30

[[apps]]
id = "ollama"
name = "Ollama"
icon = "brain"
url = "http://localhost:11434"
health_endpoint = "/api/version"
health_method = "GET"
expected_status = 200
systemd_unit = "ollama.service"
widget = "ollama"
tags = ["ai", "llm"]
category = "AI & ML"

